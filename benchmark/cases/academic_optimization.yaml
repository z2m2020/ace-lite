cases:
  - case_id: academic-query-expansion-compounds-01
    query: how does retrieval term expansion handle tree sitter and repo map compound phrases
    expected_keys: [terms, treesitter, repomap]
    filters:
      include_paths:
        - src/ace_lite/index_stage/terms.py
        - src/ace_lite/plan_quick.py
        - tests/unit/test_orchestrator_term_extraction.py
      exclude_paths:
        - tests/e2e/test_benchmark_case_files.py
        - tests/e2e/test_academic_optimization_benchmark_script.py
    top_k: 6
    comparison_lane: academic_optimization
    optimization_surface: query_expansion
    query_bucket: doc_explain


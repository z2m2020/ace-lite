name: publish-pypi

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-distributions:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          text = Path("pyproject.toml").read_text(encoding="utf-8")
          match = re.search(r'^version\s*=\s*"([^"]+)"', text, re.MULTILINE)
          if match is None:
              raise SystemExit("pyproject.toml is missing [project].version")

          package_version = match.group(1).strip()
          tag_version = "${{ github.ref_name }}".removeprefix("v").strip()
          if package_version != tag_version:
              raise SystemExit(
                  f"Tag/version mismatch: tag={tag_version}, pyproject={package_version}"
              )
          print(f"Tag/version match confirmed: {package_version}")
          PY

      - name: Build sdist and wheel
        run: python -m build

      - name: Check distributions
        run: twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish-testpypi:
    if: github.event_name == 'workflow_dispatch'
    needs: build-distributions
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/

  publish-pypi:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-distributions
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

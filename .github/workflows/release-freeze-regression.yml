name: release-freeze-regression

on:
  workflow_dispatch:
  push:
    tags:
      - "v*-rc*"

jobs:
  release-freeze:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run release freeze regression
        run: |
          python scripts/run_release_freeze_regression.py \
            --matrix-config benchmark/matrix/repos.yaml \
            --output-dir artifacts/release-freeze/latest \
            --fail-on-thresholds

      - name: Upload regression artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-freeze-artifacts
          path: artifacts/release-freeze/latest

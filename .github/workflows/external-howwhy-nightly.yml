name: external-howwhy-nightly

on:
  workflow_dispatch:
  schedule:
    - cron: "20 3 * * *"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  benchmark-external-howwhy:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run external how/why benchmark matrix
        run: |
          python scripts/run_benchmark_matrix.py \
            --matrix-config benchmark/matrix/external_howwhy.yaml \
            --output-dir artifacts/benchmark/matrix/external-howwhy-nightly \
            --fail-on-thresholds

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: external-howwhy-benchmark-artifacts
          path: artifacts/benchmark/matrix/external-howwhy-nightly
